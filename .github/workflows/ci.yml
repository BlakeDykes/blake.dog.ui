name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint:style

      # `pnpm -r build` builds every package in dependency order
      # (core -> nes/ps2 -> storybook); each runs its own tokens build +
      # tsc --noEmit + vite, so this also covers token generation,
      # typechecking, and the Storybook proof app.
      - run: pnpm build
