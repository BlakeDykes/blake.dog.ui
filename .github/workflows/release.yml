name: Release

# Publish to GitHub Packages on a version tag:
#   pnpm changeset version   (bumps + writes changelogs)
#   git commit + tag + push --follow-tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"
          scope: "@blakedykes"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Publishes every workspace package whose current version is not yet on
      # the registry (skips the frozen @blakedykes/ui and the private storybook
      # app), and rewrites workspace:* deps to real versions on the way out.
      - run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
